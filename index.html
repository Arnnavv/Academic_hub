<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Class Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #F7F6F2;
    --surface: #FFFFFF;
    --border: #E4E2DB;
    --text-primary: #1A1916;
    --text-secondary: #6B6860;
    --text-muted: #A09E97;
    --accent: #1A3A5C;
    --accent-light: #E8EEF4;
    --accent-mid: #2E5F8A;
    --common: #2C5F8A;
    --common-bg: #EAF0F6;
    --finance: #2D6A4F;
    --finance-bg: #EAF3EE;
    --marketing: #7B3A2A;
    --marketing-bg: #F5EBE8;
    --supplychain: #5B3A8A;
    --supplychain-bg: #F0EBF8;
    --radius: 10px;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
    --shadow-lg: 0 8px 40px rgba(0,0,0,0.13);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; }

  /* ── HEADER ── */
  header { background: var(--accent); color: #fff; padding: 0 40px; display: flex; align-items: center; justify-content: space-between; height: 70px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 16px rgba(0,0,0,0.15); }
  .header-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 600; letter-spacing: 0.01em; }
  .header-sub { font-size: 12px; opacity: 0.65; margin-top: 2px; font-weight: 300; }
  .sync-badge { display: flex; align-items: center; gap: 7px; background: rgba(255,255,255,0.12); padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 400; cursor: pointer; transition: background 0.2s; border: 1px solid rgba(255,255,255,0.2); }
  .sync-badge:hover { background: rgba(255,255,255,0.2); }
  .sync-dot { width:7px; height:7px; border-radius:50%; background:#4CAF50; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .sync-badge.syncing .sync-dot { background: #FFA726; animation: spin-dot 0.8s linear infinite; }
  @keyframes spin-dot { 0%{opacity:1}50%{opacity:0.3}100%{opacity:1} }

  /* ── CONTROLS BAR ── */
  .controls { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 40px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
  .filter-group { display: flex; gap: 8px; align-items: center; }
  .filter-label { font-size: 12px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; margin-right: 4px; }
  .pill { padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 500; border: 1.5px solid var(--border); background: var(--surface); cursor: pointer; transition: all 0.18s; color: var(--text-secondary); }
  .pill:hover { border-color: var(--accent); color: var(--accent); }
  .pill.active-all { background: var(--common); color: #fff; border-color: var(--common); }
  .pill.active-finance { background: var(--finance); color: #fff; border-color: var(--finance); }
  .pill.active-marketing { background: var(--marketing); color: #fff; border-color: var(--marketing); }
  .pill.active-supplychain { background: var(--supplychain); color: #fff; border-color: var(--supplychain); }
  .view-switcher { display: flex; border: 1.5px solid var(--border); border-radius: 8px; overflow: hidden; margin-left: auto; }
  .view-btn { padding: 6px 18px; font-size: 13px; font-weight: 500; background: none; border: none; cursor: pointer; color: var(--text-secondary); transition: all 0.18s; }
  .view-btn.active { background: var(--accent); color: #fff; }
  .nav-area { display: flex; align-items: center; gap: 12px; }
  .nav-btn { width: 32px; height: 32px; border-radius: 8px; border: 1.5px solid var(--border); background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--text-secondary); transition: all 0.15s; }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .current-period { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 600; min-width: 180px; }

  /* ── MAIN ── */
  main { padding: 28px 40px; max-width: 1200px; margin: 0 auto; }

  /* ── MONTHLY ── */
  #monthly-view { display: block; }
  #weekly-view { display: none; }
  .calendar-grid { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; box-shadow: var(--shadow); }
  .day-headers { display: grid; grid-template-columns: repeat(7, 1fr); background: var(--accent); }
  .day-header { padding: 11px 0; text-align: center; font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.75); text-transform: uppercase; letter-spacing: 0.08em; }
  .grid-body { display: grid; grid-template-columns: repeat(7, 1fr); }
  .grid-cell { min-height: 108px; padding: 8px 7px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); transition: background 0.12s; }
  .grid-cell:nth-child(7n) { border-right: none; }
  .grid-cell.other-month { background: #FAFAF8; }
  .grid-cell.today { background: var(--accent-light); }
  .cell-date { font-size: 13px; font-weight: 500; color: var(--text-muted); width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; border-radius: 50%; margin-bottom: 4px; }
  .grid-cell.today .cell-date { background: var(--accent); color: #fff; }
  .grid-cell.other-month .cell-date { color: #C9C7C0; }
  .event-chip { font-size: 11px; font-weight: 500; padding: 2px 7px; border-radius: 4px; margin-bottom: 3px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: opacity 0.15s; }
  .event-chip:hover { opacity: 0.78; }
  .chip-common { background: var(--common-bg); color: var(--common); }
  .chip-finance { background: var(--finance-bg); color: var(--finance); }
  .chip-marketing { background: var(--marketing-bg); color: var(--marketing); }
  .chip-supplychain { background: var(--supplychain-bg); color: var(--supplychain); }
  .chip-hidden { display: none !important; }
  .more-events { font-size: 11px; color: var(--text-muted); cursor: pointer; padding: 1px 4px; }
  .more-events:hover { color: var(--accent); }

  /* ── WEEKLY ── */
  .week-grid { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; box-shadow: var(--shadow); }
  .week-headers { display: grid; grid-template-columns: 60px repeat(7, 1fr); background: var(--accent); }
  .week-header-cell { padding: 12px 8px; text-align: center; font-size: 11px; color: rgba(255,255,255,0.75); text-transform: uppercase; letter-spacing: 0.07em; font-weight: 500; }
  .week-header-cell.today-col { color: #fff; font-weight: 500; }
  .week-header-date { font-size: 20px; font-family: 'Playfair Display', serif; display: block; color: rgba(255,255,255,0.9); }
  .week-header-cell.today-col .week-header-date { background: rgba(255,255,255,0.25); border-radius: 50%; width: 34px; height: 34px; display: inline-flex; align-items: center; justify-content: center; }
  .week-body { display: grid; grid-template-columns: 60px repeat(7, 1fr); }
  .week-time-cell { padding: 0; display: flex; align-items: flex-start; justify-content: flex-end; padding-right: 10px; padding-top: 4px; font-size: 11px; color: var(--text-muted); border-bottom: 1px solid var(--border); min-height: 54px; }
  .week-day-col { border-left: 1px solid var(--border); border-bottom: 1px solid var(--border); min-height: 54px; padding: 3px 4px; position: relative; }
  .week-event { font-size: 11px; padding: 3px 7px; border-radius: 5px; margin-bottom: 3px; cursor: pointer; transition: opacity 0.15s; font-weight: 500; line-height: 1.4; }
  .week-event:hover { opacity: 0.75; }

  /* ── LEGEND ── */
  .legend { display: flex; gap: 20px; margin-bottom: 18px; align-items: center; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-secondary); }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }
  .dot-common { background: var(--common); }
  .dot-finance { background: var(--finance); }
  .dot-marketing { background: var(--marketing); }
  .dot-supplychain { background: var(--supplychain); }

  /* ── MODAL ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(20,20,18,0.45); display: none; align-items: center; justify-content: center; z-index: 200; backdrop-filter: blur(3px); }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: 14px; width: 420px; max-width: 94vw; box-shadow: var(--shadow-lg); overflow: hidden; animation: modal-in 0.2s ease; position: relative; }
  @keyframes modal-in { from{transform:scale(0.94);opacity:0} to{transform:scale(1);opacity:1} }
  .modal-header { padding: 22px 24px 16px; border-bottom: 1px solid var(--border); }
  .modal-category { display: inline-block; font-size: 11px; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; padding: 3px 10px; border-radius: 12px; margin-bottom: 10px; }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 600; line-height: 1.3; }
  .modal-body { padding: 20px 24px; }
  .modal-row { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 14px; font-size: 14px; }
  .modal-icon { font-size: 16px; margin-top: 1px; flex-shrink: 0; }
  .modal-row-label { font-weight: 500; color: var(--text-primary); }
  .modal-row-sub { color: var(--text-secondary); font-size: 13px; margin-top: 2px; }
  .modal-link { display: inline-flex; align-items: center; gap: 6px; margin-top: 6px; padding: 8px 16px; background: var(--accent); color: #fff; border-radius: 7px; font-size: 13px; font-weight: 500; text-decoration: none; transition: background 0.15s; }
  .modal-link:hover { background: var(--accent-mid); }
  .modal-footer { padding: 0 24px 20px; }
  .modal-close { position: absolute; top: 16px; right: 18px; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-muted); line-height: 1; }

  /* ── RESPONSIVE ── */
  @media (max-width: 700px) {
    header, .controls, main { padding-left: 16px; padding-right: 16px; }
    .current-period { font-size: 15px; min-width: 130px; }
    .grid-cell { min-height: 72px; padding: 5px 3px; }
    .event-chip { font-size: 10px; padding: 1px 4px; }
    .controls { gap: 10px; }
    .view-switcher { margin-left: 0; }
    .filter-group { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div>
    <div class="header-title">Class Schedule</div>
    <div class="header-sub">Academic Calendar Portal</div>
  </div>
  <div class="sync-badge" id="syncBadge" onclick="manualSync()" title="Click to sync now">
    <span class="sync-dot" id="syncDot"></span>
    <span id="syncText">Live from iCloud</span>
  </div>
</header>

<!-- CONTROLS -->
<div class="controls">
  <div class="nav-area">
    <button class="nav-btn" onclick="navigate(-1)">&#8249;</button>
    <span class="current-period" id="periodLabel"></span>
    <button class="nav-btn" onclick="navigate(1)">&#8250;</button>
    <button class="nav-btn" onclick="goToday()" title="Today" style="font-size:12px;padding:0 10px;width:auto;">Today</button>
  </div>
  <div class="filter-group">
    <span class="filter-label">View:</span>
    <button class="pill active-all" id="pill-all" onclick="setFilter('all')">All Classes</button>
    <button class="pill" id="pill-finance" onclick="setFilter('finance')">Finance</button>
    <button class="pill" id="pill-marketing" onclick="setFilter('marketing')">Marketing</button>
    <button class="pill" id="pill-supplychain" onclick="setFilter('supplychain')">Supply Chain</button>
  </div>
  <div class="view-switcher">
    <button class="view-btn active" id="btn-monthly" onclick="setView('monthly')">Monthly</button>
    <button class="view-btn" id="btn-weekly" onclick="setView('weekly')">Weekly</button>
  </div>
</div>

<!-- MAIN -->
<main>

  <!-- Timezone Notice -->
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;padding:9px 14px;background:var(--accent-light);border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text-secondary);">
    <span style="font-size:15px;">🕐</span>
    <span>All times shown in <strong style="color:var(--text-primary)" id="tzLabel"></strong></span>
  </div>

  <!-- Legend -->
  <div class="legend">
    <div class="legend-item"><span class="legend-dot dot-common"></span> Core (all students)</div>
    <div class="legend-item"><span class="legend-dot dot-finance"></span> Finance</div>
    <div class="legend-item"><span class="legend-dot dot-marketing"></span> Marketing</div>
    <div class="legend-item"><span class="legend-dot dot-supplychain"></span> Supply Chain</div>
  </div>

  <!-- Monthly View -->
  <div id="monthly-view">
    <div class="calendar-grid">
      <div class="day-headers">
        <div class="day-header">Sun</div><div class="day-header">Mon</div>
        <div class="day-header">Tue</div><div class="day-header">Wed</div>
        <div class="day-header">Thu</div><div class="day-header">Fri</div>
        <div class="day-header">Sat</div>
      </div>
      <div class="grid-body" id="monthGrid"></div>
    </div>
  </div>

  <!-- Weekly View -->
  <div id="weekly-view">
    <div class="week-grid">
      <div class="week-headers" id="weekHeaders"></div>
      <div class="week-body" id="weekBody"></div>
    </div>
  </div>

</main>

<!-- EVENT MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div class="modal-header">
      <div class="modal-category" id="modalCategory"></div>
      <div class="modal-title" id="modalTitle"></div>
    </div>
    <div class="modal-body">
      <div class="modal-row"><span class="modal-icon">📅</span><div><div class="modal-row-label" id="modalDate"></div></div></div>
      <div class="modal-row"><span class="modal-icon">🕐</span><div><div class="modal-row-label" id="modalTime"></div></div></div>
      <div class="modal-row"><span class="modal-icon">🎓</span><div><div class="modal-row-label">Specialization</div><div class="modal-row-sub" id="modalSpecialization"></div></div></div>
      <div class="modal-row" id="modalLocationRow" style="display:none"><span class="modal-icon">📍</span><div><div class="modal-row-label" id="modalLocation"></div></div></div>
      <div class="modal-row" id="modalDescRow" style="display:none"><span class="modal-icon">📝</span><div><div class="modal-row-label" id="modalDesc"></div></div></div>
    </div>
    <div class="modal-footer" id="modalLinkArea"></div>
  </div>
</div>

<script>
// ─── TIMEZONE LABEL ───────────────────────────────────────────────────────────
(function() {
  const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
  const tzMap = {
    'Asia/Kolkata':'IST','Asia/Calcutta':'IST',
    'Asia/Dubai':'GST','Asia/Muscat':'GST',
    'Asia/Singapore':'SGT','Asia/Kuala_Lumpur':'MYT',
    'America/New_York':'EST','America/Chicago':'CST',
    'America/Denver':'MST','America/Los_Angeles':'PST',
    'Europe/London':'GMT','Europe/Paris':'CET',
    'Europe/Berlin':'CET','Asia/Tokyo':'JST',
    'Asia/Shanghai':'CST','Asia/Hong_Kong':'HKT',
    'Australia/Sydney':'AEDT','Australia/Melbourne':'AEDT',
    'Pacific/Auckland':'NZST','Asia/Karachi':'PKT',
    'Asia/Dhaka':'BST','Asia/Bangkok':'ICT',
    'Africa/Nairobi':'EAT','America/Toronto':'EST',
    'America/Vancouver':'PST','Asia/Riyadh':'AST',
    'Asia/Kuwait':'AST','Asia/Qatar':'AST',
    'Asia/Bahrain':'AST','Asia/Baghdad':'AST',
  };
  const abbr = tzMap[tz] || new Date().toLocaleTimeString('en-US', {timeZoneName:'short'}).split(' ').pop();
  document.getElementById('tzLabel').textContent = abbr;
})();

// ─── STATE ────────────────────────────────────────────────────────────────────
let events = [];
let currentDate = new Date();
let currentView = 'monthly';
let currentFilter = 'all';
let icalUrl = 'https://p136-caldav.icloud.com/published/2/MjAwNDQ0OTc1NDkyMDA0NJyAi43l6XUcJJh8O3fV_-Sp0FYDItEwZIhkGy0jKAXnBMy_0uSZ3zJilFwzBqGyqX-2SjO7zSNMkQn0AcS2JLA';

// ─── iCAL PARSER ─────────────────────────────────────────────────────────────
function parseICS(text) {
  // Handle folded lines (lines starting with space/tab are continuations)
  text = text.replace(/\r\n[ \t]/g, '').replace(/\r\n/g, '\n').replace(/\n[ \t]/g, '');
  const lines = text.split('\n');
  const evs = []; let cur = null;
  const parseDate = s => {
    if (!s) return null;
    s = s.replace(/^[^:]+:/, '');
    const y=+s.slice(0,4),mo=+s.slice(4,6)-1,d=+s.slice(6,8);
    if (s.includes('T')) { const h=+s.slice(9,11),mi=+s.slice(11,13); return new Date(y,mo,d,h,mi); }
    return new Date(y,mo,d);
  };
  for (const raw of lines) {
    const colon = raw.indexOf(':');
    if (colon < 0) continue;
    const key = raw.slice(0, colon).toUpperCase().split(';')[0];
    const val = raw.slice(colon + 1).trim();
    if (key === 'BEGIN' && val === 'VEVENT') cur = {};
    else if (key === 'END' && val === 'VEVENT' && cur) {
      if (cur.start) {
        const { category, cleanDesc, extractedUrl } = parseSpecialization(cur.description || '');
        evs.push({
          id: Math.random().toString(36).slice(2),
          title: cur.title || 'Event',
          start: cur.start, end: cur.end || cur.start,
          location: cur.location || '',
          url: cur.url ? (cur.url.startsWith('http') ? cur.url : 'https://' + cur.url) : extractedUrl || '',
          description: cleanDesc,
          category
        });
      }
      cur = null;
    } else if (cur) {
      if (key === 'SUMMARY') cur.title = val;
      else if (key === 'DTSTART') cur.start = parseDate(raw);
      else if (key === 'DTEND')   cur.end   = parseDate(raw);
      else if (key === 'LOCATION') cur.location = val;
      else if (key === 'URL') cur.url = val;
      else if (key === 'DESCRIPTION') cur.description = val.replace(/\\n/g,'\n').replace(/\\,/g,',');
    }
  }
  return evs;
}

// ─── PARSE SPECIALIZATION + CLEAN DESCRIPTION ─────────────────────────────────
function parseSpecialization(desc) {
  const map = { 'finance': 'finance', 'marketing': 'marketing', 'supply chain': 'supplychain', 'core': 'common' };
  let category = 'common';
  let cleanDesc = desc;
  let extractedUrl = '';

  // Extract URL from description
  const urlMatch = desc.match(/https?:\/\/[^\s\n\\]+/i);
  if (urlMatch) {
    extractedUrl = urlMatch[0].replace(/\\$/, '').trim();
    cleanDesc = cleanDesc.replace(urlMatch[0], '');
  }

  // Extract specialization
  const match = desc.match(/specialization\s*:\s*([^\n]+)/i);
  if (match) {
    const val = match[1].trim().toLowerCase();
    for (const [k, v] of Object.entries(map)) { if (val.includes(k)) { category = v; break; } }
    cleanDesc = cleanDesc.replace(/specialization\s*:[^\n]*/i, '');
  }

  // Clean separator lines like ----( Video Call )---- and ---===---
  cleanDesc = cleanDesc
    .replace(/----\(.*?\)----/g, '')
    .replace(/---[=\-]+---/g, '')
    .replace(/--[=\-]+=*--*/g, '')
    .replace(/\n{2,}/g, '\n')
    .trim();

  return { category, cleanDesc, extractedUrl };
}

// ─── SYNC FUNCTIONS ───────────────────────────────────────────────────────────
async function autoSync() {
  if (!icalUrl) return;
  setSyncing(true);
  try {
    const proxyUrl = 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(icalUrl);
    const res = await fetch(proxyUrl);
    const text = await res.text();
    if (!text.includes('VCALENDAR')) { setSyncing(false, 'Sync failed'); return; }
    events = parseICS(text);
    render();
    setSyncing(false, 'Synced · iCloud');
  } catch(e) { setSyncing(false, 'Sync failed'); }
}

async function manualSync() { await autoSync(); }

function setSyncing(on, msg) {
  const badge = document.getElementById('syncBadge');
  const txt = document.getElementById('syncText');
  if (on) { badge.classList.add('syncing'); txt.textContent = 'Syncing…'; }
  else { badge.classList.remove('syncing'); txt.textContent = msg || 'Live from iCloud'; }
}

// ─── FILTER & VIEW ────────────────────────────────────────────────────────────
function setFilter(f) {
  currentFilter = f;
  ['all','finance','marketing','supplychain'].forEach(k => {
    const p = document.getElementById('pill-'+k);
    p.className = 'pill';
    if (k === f) p.classList.add(f==='all'?'active-all':f==='finance'?'active-finance':f==='marketing'?'active-marketing':'active-supplychain');
  });
  render();
}

function eventVisible(ev) {
  if (currentFilter === 'all') return true;
  if (currentFilter === 'finance') return ev.category === 'common' || ev.category === 'finance';
  if (currentFilter === 'marketing') return ev.category === 'common' || ev.category === 'marketing';
  if (currentFilter === 'supplychain') return ev.category === 'common' || ev.category === 'supplychain';
  return true;
}

function setView(v) {
  currentView = v;
  document.getElementById('monthly-view').style.display = v === 'monthly' ? 'block' : 'none';
  document.getElementById('weekly-view').style.display  = v === 'weekly'  ? 'block' : 'none';
  document.getElementById('btn-monthly').classList.toggle('active', v === 'monthly');
  document.getElementById('btn-weekly').classList.toggle('active', v === 'weekly');
  render();
}

function navigate(dir) {
  if (currentView === 'monthly') {
    currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + dir, 1);
  } else {
    currentDate = new Date(currentDate.getTime() + dir * 7 * 86400000);
  }
  render();
}

function goToday() { currentDate = new Date(); render(); }

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  if (currentView === 'monthly') renderMonthly(); else renderWeekly();
}

function renderMonthly() {
  const y = currentDate.getFullYear(), m = currentDate.getMonth();
  const today = new Date();
  document.getElementById('periodLabel').textContent =
    new Date(y, m, 1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  const firstDay = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const daysInPrev  = new Date(y, m, 0).getDate();
  const grid = document.getElementById('monthGrid');
  grid.innerHTML = '';
  const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;
  for (let i = 0; i < totalCells; i++) {
    let day, month = m, year = y, otherMonth = false;
    if (i < firstDay) { day = daysInPrev - firstDay + i + 1; month = m-1; otherMonth = true; if(month<0){month=11;year--;} }
    else if (i >= firstDay + daysInMonth) { day = i - firstDay - daysInMonth + 1; month = m+1; otherMonth = true; if(month>11){month=0;year++;} }
    else { day = i - firstDay + 1; }
    const cellDate = new Date(year, month, day);
    const isToday = cellDate.toDateString() === today.toDateString();
    const cell = document.createElement('div');
    cell.className = 'grid-cell' + (otherMonth ? ' other-month' : '') + (isToday ? ' today' : '');
    const dateEl = document.createElement('div');
    dateEl.className = 'cell-date';
    dateEl.textContent = day;
    cell.appendChild(dateEl);
    const dayEvs = events.filter(e => {
      const d = new Date(e.start); return d.getFullYear()===year && d.getMonth()===month && d.getDate()===day;
    }).sort((a,b) => a.start-b.start);
    const maxShow = 3;
    dayEvs.slice(0, maxShow).forEach(ev => {
      const chip = document.createElement('div');
      chip.className = 'event-chip chip-' + ev.category;
      if (!eventVisible(ev)) chip.classList.add('chip-hidden');
      chip.textContent = ev.title;
      chip.title = ev.title;
      chip.onclick = () => openModal(ev);
      cell.appendChild(chip);
    });
    if (dayEvs.length > maxShow) {
      const more = document.createElement('div');
      more.className = 'more-events';
      more.textContent = '+' + (dayEvs.length - maxShow) + ' more';
      more.onclick = () => openModal(dayEvs[maxShow]);
      cell.appendChild(more);
    }
    grid.appendChild(cell);
  }
}

function renderWeekly() {
  const today = new Date();
  const dow = currentDate.getDay();
  const weekStart = new Date(currentDate); weekStart.setDate(currentDate.getDate() - dow);
  weekStart.setHours(0,0,0,0);
  const days = Array.from({length:7}, (_,i) => { const d=new Date(weekStart); d.setDate(weekStart.getDate()+i); return d; });
  document.getElementById('periodLabel').textContent =
    days[0].toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' – ' +
    days[6].toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  const hdr = document.getElementById('weekHeaders');
  hdr.innerHTML = '<div class="week-header-cell"></div>';
  days.forEach(d => {
    const isToday = d.toDateString() === today.toDateString();
    hdr.innerHTML += `<div class="week-header-cell${isToday?' today-col':''}">
      ${d.toLocaleDateString('en-US',{weekday:'short'})}
      <span class="week-header-date">${d.getDate()}</span>
    </div>`;
  });
  const hours = Array.from({length:13}, (_,i) => i+8);
  const body = document.getElementById('weekBody');
  body.innerHTML = '';
  hours.forEach(h => {
    const timeCell = document.createElement('div');
    timeCell.className = 'week-time-cell';
    timeCell.textContent = h < 12 ? h+':00 AM' : h===12 ? '12:00 PM' : (h-12)+':00 PM';
    body.appendChild(timeCell);
    days.forEach(d => {
      const col = document.createElement('div');
      col.className = 'week-day-col';
      const dayEvs = events.filter(e => {
        const es = new Date(e.start);
        return es.getFullYear()===d.getFullYear() && es.getMonth()===d.getMonth() && es.getDate()===d.getDate() && es.getHours()===h;
      });
      dayEvs.forEach(ev => {
        if (!eventVisible(ev)) return;
        const el = document.createElement('div');
        el.className = 'week-event chip-' + ev.category;
        const st = new Date(ev.start), en = new Date(ev.end);
        el.innerHTML = `<strong>${ev.title}</strong><br>${fmtTime(st)}–${fmtTime(en)}`;
        el.onclick = () => openModal(ev);
        col.appendChild(el);
      });
      body.appendChild(col);
    });
  });
}

function fmtTime(d) {
  let h = d.getHours(), mi = d.getMinutes(), ampm = h >= 12 ? 'pm' : 'am';
  h = h % 12 || 12;
  return h + (mi ? ':'+String(mi).padStart(2,'0') : '') + ampm;
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function openModal(ev) {
  const catColors = {
    common:      { bg:'var(--common-bg)',      color:'var(--common)',      label:'Core – All Students' },
    finance:     { bg:'var(--finance-bg)',     color:'var(--finance)',     label:'Finance' },
    marketing:   { bg:'var(--marketing-bg)',   color:'var(--marketing)',   label:'Marketing' },
    supplychain: { bg:'var(--supplychain-bg)', color:'var(--supplychain)', label:'Supply Chain' }
  };
  const specLabels = { common: 'Core (all students)', finance: 'Finance', marketing: 'Marketing', supplychain: 'Supply Chain' };
  const cc = catColors[ev.category] || catColors.common;
  const cat = document.getElementById('modalCategory');
  cat.textContent = cc.label; cat.style.background = cc.bg; cat.style.color = cc.color;
  document.getElementById('modalTitle').textContent = ev.title;
  const d = new Date(ev.start);
  document.getElementById('modalDate').textContent = d.toLocaleDateString('en-US', {weekday:'long',month:'long',day:'numeric',year:'numeric'});
  document.getElementById('modalTime').textContent = fmtTime(new Date(ev.start)) + ' – ' + fmtTime(new Date(ev.end));
  document.getElementById('modalSpecialization').textContent = specLabels[ev.category] || 'Core (all students)';
  const locRow = document.getElementById('modalLocationRow');
  if (ev.location) { document.getElementById('modalLocation').textContent = ev.location; locRow.style.display='flex'; }
  else { locRow.style.display='none'; }
  const descRow = document.getElementById('modalDescRow');
  if (ev.description) { document.getElementById('modalDesc').textContent = ev.description; descRow.style.display='flex'; }
  else { descRow.style.display='none'; }
  const linkArea = document.getElementById('modalLinkArea');
  linkArea.innerHTML = ev.url ? `<a class="modal-link" href="${ev.url}" target="_blank">&#x1F517; Join Online Class</a>` : '';
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modalOverlay') || !e.target) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
autoSync();
setInterval(autoSync, 5 * 60 * 1000);
render();
</script>
